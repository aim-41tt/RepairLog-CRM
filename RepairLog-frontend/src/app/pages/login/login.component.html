<div class="login-wrapper">
  <div class="card login-card">
    <h2 class="login-card__title">CRM Сервисного центра</h2>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="form-group">
        <label>Логин</label>
        <input type="text" formControlName="login" placeholder="Введите логин" autocomplete="username" />
      </div>

      <div class="form-group">
        <label>Пароль</label>
        <input type="password" formControlName="password" placeholder="Введите пароль" autocomplete="current-password" />
      </div>

      @if (error()) {
        <p class="login-card__error">{{ error() }}</p>
      }

      <button type="submit" class="btn btn--primary login-card__submit" [disabled]="loading()">
        {{ loading() ? 'Вход...' : 'Войти' }}
      </button>
    </form>
  </div>
</div>
