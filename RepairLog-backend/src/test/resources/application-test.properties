# ==============================================================================
# CRM RepairLog - Test Profile Configuration (Testcontainers)
# ==============================================================================
# DataSource и Redis настраиваются автоматически через @ServiceConnection.
# PostgreSQL и Redis контейнеры стартуют через Testcontainers.
# ==============================================================================

# JPA: схема загружается через init-script контейнера PostgreSQL
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# JWT (тестовый секрет, >= 256 бит для HMAC-SHA256)
app.jwt.secret=test_secret_key_for_integration_tests_minimum_256_bits_long_enough_for_hmac_sha256_algorithm
app.jwt.expiration-ms=3600000
app.jwt.refresh-expiration-ms=7200000
app.jwt.issuer=RepairLog-CRM-Test

# Security
app.security.max-login-attempts=5
app.security.account-lock-duration-minutes=30
app.security.password-expiration-days=90

# CORS (в тестах не требуется, но нужен валидный URL)
app.cors.allowed-origins=http://localhost:8080

# Monitoring Service (заглушка для тестов)
monitoring.service.base-url=http://localhost:19090
monitoring.service.api-key=test-api-key

# Kafka — полностью отключена в тестах (нет Kafka Testcontainer)
# Исключаем Spring Boot auto-configuration чтобы KafkaAdmin не пытался подключиться к localhost:9092
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration
app.kafka.enabled=false

# Логирование: минимум шума в тестах
logging.level.root=WARN
logging.level.ru.papkov.repairlog=INFO
logging.level.org.springframework.web=WARN
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.testcontainers=INFO
logging.level.com.github.dockerjava=WARN
logging.level.docker.java=WARN
