# ════════════════════════════════════════════════════════════════════════════
# CRM RepairLog - Development Profile Configuration
# ════════════════════════════════════════════════════════════════════════════

spring:
  # DataSource Configuration
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:repairlog_db}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000
      pool-name: RepairLogHikariPool

  # JPA Configuration
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # Redis Configuration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:redis_strong_password_here}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 10
          max-idle: 10
          min-idle: 2
          max-wait: -1ms

# Server Configuration
server:
  port: 8080

# Logging Configuration
logging:
  level:
    root: INFO
    ru.papkov.repairlog: DEBUG
    org.springframework.web: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

# Management
management:
  endpoint:
    health:
      show-details: always

# Application Configuration
app:
  jwt:
    # Development uses shorter expiration for testing
    expiration-ms: 3600000 # 1 hour
    
  cors:
    allowed-origins: http://localhost:4200,http://localhost:3000,http://localhost:80
