# ==============================================================================
# CRM RepairLog - Production Profile Configuration
# ==============================================================================

# DataSource Configuration
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.pool-name=RepairLogHikariPool

# JPA Configuration (prod overrides)
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Redis Configuration
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.timeout=2000ms
spring.data.redis.lettuce.pool.max-active=20
spring.data.redis.lettuce.pool.max-idle=10
spring.data.redis.lettuce.pool.min-idle=5
spring.data.redis.lettuce.pool.max-wait=-1ms

# Server Configuration
server.port=${SERVER_PORT:8080}
server.error.include-stacktrace=never
server.error.include-exception=false

# Logging Configuration (prod overrides)
logging.level.root=WARN
logging.level.ru.papkov.repairlog=INFO
logging.level.org.springframework.web=WARN
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.file.name=/var/log/repairlog/application.log
logging.file.max-size=50MB
logging.file.max-history=90

# Management (prod overrides)
management.endpoint.health.show-details=when-authorized

# Application Configuration (prod overrides)
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION:43200000}

# CORS (prod overrides)
app.cors.allowed-origins=${CORS_ORIGINS}
