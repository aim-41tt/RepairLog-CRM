# ════════════════════════════════════════════════════════════════════════════
# CRM RepairLog - Production Profile Configuration
# ════════════════════════════════════════════════════════════════════════════

spring:
  # DataSource Configuration
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 10
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: RepairLogHikariPool

  # JPA Configuration
  jpa:
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  # Redis Configuration
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: -1ms

# Server Configuration
server:
  port: ${SERVER_PORT:8080}
  error:
    include-stacktrace: never
    include-exception: false

# Logging Configuration
logging:
  level:
    root: WARN
    ru.papkov.repairlog: INFO
    org.springframework.web: WARN
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
  file:
    name: /var/log/repairlog/application.log
    max-size: 50MB
    max-history: 90

# Management
management:
  endpoint:
    health:
      show-details: when-authorized

# Application Configuration
app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRATION:43200000}
    
  cors:
    allowed-origins: ${CORS_ORIGINS}
