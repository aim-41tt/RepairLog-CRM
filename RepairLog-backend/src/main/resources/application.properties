# ==============================================================================
# CRM RepairLog - Main Application Configuration
# ==============================================================================

spring.application.name=RepairLog-backend

# Profile Configuration
spring.profiles.active=${SPRING_PROFILE:dev}

# JPA Configuration
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Jackson Configuration
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.serialization.fail-on-empty-beans=false
spring.jackson.deserialization.fail-on-unknown-properties=false
spring.jackson.default-property-inclusion=non_null
spring.jackson.time-zone=Europe/Moscow

# Servlet Multipart Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Server Configuration
server.port=${SERVER_PORT:8080}
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=never
server.error.include-exception=false
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain

# Management & Actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoints.web.base-path=/actuator
management.endpoint.health.show-details=when-authorized
management.metrics.export.prometheus.enabled=true

# Logging Configuration
logging.level.root=INFO
logging.level.ru.papkov.repairlog=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=logs/repairlog.log
logging.file.max-size=10MB
logging.file.max-history=30

# SpringDoc OpenAPI Configuration (Swagger UI)
springdoc.api-docs.path=/api-docs
springdoc.api-docs.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.display-request-duration=true
springdoc.swagger-ui.doc-expansion=none
springdoc.show-actuator=false

# ==============================================================================
# Application Specific Configuration
# ==============================================================================

# JWT Configuration
app.jwt.secret=${JWT_SECRET:change_this_to_very_long_random_string_minimum_256_bits_for_production_use}
app.jwt.expiration-ms=${JWT_EXPIRATION:43200000}
app.jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION:604800000}
app.jwt.issuer=RepairLog-CRM

# Security Configuration
app.security.max-login-attempts=${MAX_LOGIN_ATTEMPTS:5}
app.security.account-lock-duration-minutes=${ACCOUNT_LOCK_DURATION_MINUTES:30}
app.security.password-expiration-days=90


# CORS Configuration
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:4200,http://localhost:80}
app.cors.allowed-methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
app.cors.allowed-headers=*
app.cors.allow-credentials=true
app.cors.max-age=3600

# Webhook Security
app.webhook.secret=${WEBHOOK_SECRET:}

# ==============================================================================
# Monitoring Service Integration
# ==============================================================================
monitoring.service.base-url=${MONITORING_SERVICE_URL:http://localhost:8090}
monitoring.service.api-key=${MONITORING_SERVICE_API_KEY:}
